<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MAX E2E Popup</title>
    <link rel="stylesheet" href="./popup.css" />
  </head>
  <body>
    <main class="app">
      <header class="header">
        <h1>MAX E2E</h1>
        <p class="muted">Одноразовая DH‑сессия для каждого сообщения</p>
      </header>

      <nav class="tabs" role="tablist" aria-label="Режим">
        <button id="tab-send" class="tab is-active" data-tab="send" role="tab" aria-selected="true">Отправить</button>
        <button id="tab-read" class="tab" data-tab="read" role="tab" aria-selected="false">Читать</button>
      </nav>

      <section class="panel" data-panel="send">
        <h2>Роль: Отправитель</h2>
        <p id="send-step" class="step">Состояние: idle</p>

        <label for="send-plaintext">Текст сообщения</label>
        <textarea id="send-plaintext" placeholder="Введите текст для шифрования (понадобится на шаге encrypt_and_send)"></textarea>

        <label for="send-incoming">Входящее служебное сообщение из MAX</label>
        <textarea id="send-incoming" placeholder="Вставьте ack_params или pub"></textarea>

        <div class="actions">
          <button id="send-start">Новая сессия (params)</button>
          <button id="send-next">Следующий шаг</button>
          <button id="send-copy">Копировать исходящее</button>
          <button id="send-reset" class="danger">Сбросить сессию</button>
        </div>

        <label for="send-outgoing">Исходящее сообщение в MAX</label>
        <textarea id="send-outgoing" readonly placeholder="Здесь появится JSON/base64 для отправки"></textarea>
      </section>

      <section class="panel hidden" data-panel="read">
        <h2>Роль: Получатель</h2>
        <p id="read-step" class="step">Состояние: idle</p>

        <label for="read-incoming">Входящее служебное сообщение / ciphertext из MAX</label>
        <textarea id="read-incoming" placeholder="Вставьте params, pub или final packet"></textarea>

        <div class="actions">
          <button id="read-next">Следующий шаг</button>
          <button id="read-copy">Копировать исходящее</button>
          <button id="read-reset" class="danger">Сбросить сессию</button>
        </div>

        <label for="read-outgoing">Исходящее сообщение в MAX</label>
        <textarea id="read-outgoing" readonly placeholder="Здесь появится ACK/PUB для отправки"></textarea>

        <label for="read-plaintext">Расшифрованный текст</label>
        <textarea id="read-plaintext" readonly placeholder="Появится после шага decrypt"></textarea>
      </section>

      <footer>
        <p id="global-status" class="status muted">Готово.</p>
      </footer>
    </main>

    <script type="module" src="./popup.js"></script>
  </body>
</html>
